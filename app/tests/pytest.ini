[pytest]
# Pytest configuration for the Yaksha (ksp-saathi) test suite.
#
# Run by marker:
#   pytest -m unit              # in-memory, no network (CI always)
#   pytest -m integration       # live orchestrator (requires CATALYST_API_BASE)
#   pytest -m bilingual         # Kannada + English coverage eval
#   pytest -m voice             # voice loop tests (requires audio fixtures)
#   pytest -m rbac              # role-based access control
#   pytest -m data_quality      # synthetic FIR data integrity
#
# Common combos:
#   pytest -m "unit or data_quality"     # fast hermetic suite (CI default)
#   pytest -m "not integration"          # everything except live calls
#   pytest -m "integration and bilingual"
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Marker registry — pytest --strict-markers fails on typos.
markers =
    unit: hermetic tests, no network, default in CI
    integration: hits deployed orchestrator (requires CATALYST_API_BASE)
    bilingual: Kannada + English language coverage
    voice: voice STT/TTS loop, requires fixtures/audio/*
    rbac: role-based access control + masked-field enforcement
    data_quality: validates synthetic FIR data integrity
    slow: takes > 2s; excluded by `-m "not slow"`

# Be strict so a typo'd marker fails CI rather than silently no-op'ing.
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider

# Logging — capture at WARNING by default; INFO + DEBUG flow through with -s.
log_level = WARNING
log_cli = false
log_format = %(asctime)s %(levelname)s %(name)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
