<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" role="img" aria-label="Sarvik">
  <!-- Black circular background -->
  <circle cx="50" cy="50" r="50" fill="#0F0F12"/>

  <!-- Two overlapping organic white petal/leaf shapes, rotated diagonally.
       Each petal is an elongated ellipse with rounded ends, transformed into
       position. Shapes are intentionally offset and rotated ~25 degrees so
       they cross slightly, echoing the SparkFinch / techjays mark. -->
  <g>
    <!-- Petal 1 (upper-left, leaning right) -->
    <ellipse cx="50" cy="50" rx="11" ry="33" fill="#FFFFFF"
             transform="rotate(-28 50 50) translate(-7 -2)"/>
    <!-- Petal 2 (lower-right, leaning left) — overlaps Petal 1 -->
    <ellipse cx="50" cy="50" rx="11" ry="33" fill="#FFFFFF"
             transform="rotate(28 50 50) translate(7 2)"/>
  </g>

  <!-- Small accent dot, upper-right (the "spark") -->
  <circle cx="74" cy="26" r="4.2" fill="#FFFFFF"/>
</svg>
