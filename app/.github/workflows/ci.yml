name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # Python — Catalyst Functions, data pipeline, validation
  # ----------------------------------------------------------
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with Ruff
        working-directory: app
        run: |
          ruff check backend/ data-pipeline/ validation/
          ruff format --check backend/ data-pipeline/ validation/

      - name: Run pytest
        working-directory: app/backend
        env:
          CATALYST_PROJECT_ID: '10000000000000'
          CATALYST_AUTH_TOKEN: 'test-token'
          GEMINI_API_KEY: 'test-key'
          NEO4J_URI: 'neo4j://localhost:7687'
          NEO4J_USERNAME: 'neo4j'
          NEO4J_PASSWORD: 'test'
          APP_ENV: 'test'
        run: |
          pytest -v --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: app/backend/coverage.xml
          if-no-files-found: ignore

  # ----------------------------------------------------------
  # Node — Next.js frontend
  # ----------------------------------------------------------
  node:
    name: Node (build + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Lint
        working-directory: app/frontend
        run: npm run lint

      - name: Typecheck
        working-directory: app/frontend
        run: npm run typecheck

      - name: Build
        working-directory: app/frontend
        env:
          NEXT_PUBLIC_CATALYST_PROJECT_ID: '10000000000000'
          NEXT_PUBLIC_CATALYST_AUTH_DOMAIN: 'accounts.zoho.in'
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: 'ci-build-placeholder'
          NEXT_PUBLIC_APP_URL: 'https://saathi.ksp-datathon.dev'
          NEXT_PUBLIC_API_BASE_URL: 'https://api.saathi.ksp-datathon.dev'
        run: npm run build

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: app/frontend/.next/
          retention-days: 3
          if-no-files-found: ignore
